<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Receipt</title>

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            color: #000000;
            padding: 40px 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .receipt {
            max-width: 400px;
            margin: auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05), 0 0 0 1px rgb(0 0 0 / 0.05);
        }

        h1 {
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #000000;
            margin: 0 0 16px 0;
        }

        .status-badge {
            text-align: center;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .meta p {
            margin: 0;
            font-size: 13px;
            color: #000000;
            display: flex;
            justify-content: space-between;
        }

        .meta b {
            color: #000000;
            font-weight: 600;
        }

        hr {
            border: none;
            border-top: 1px dashed #e2e8f0;
            margin: 20px 0;
        }

        .item {
            margin-bottom: 16px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            color: #000000;
        }

        .item-header span:first-child {
            display: flex;
            gap: 4px;
        }

        .custom {
            margin-left: 28px;
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .total {
            font-size: 18px;
            font-weight: 700;
            color: #000000;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            color: #000000;
            font-weight: 500;
        }

        .error {
            text-align: center;
            padding: 32px 24px;
            background: #fff5f5;
            border: 1px solid #fee2e2;
            border-radius: 16px;
        }

        .error h2 {
            font-size: 16px;
            color: #dc2626;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        .error p {
            font-size: 13px;
            color: #7f1d1d;
            margin: 0;
        }
    </style>
</head>

<body>

    <!-- ORDER NOT FOUND -->
    <div th:if="${order == null}" class="receipt error">
        <h2>No order details available</h2>
        <p>Please check your QR code or try again later.</p>
    </div>

    <!-- ORDER FOUND -->
    <div th:if="${order != null}" class="receipt">

        <h1>ORDER RECEIPT</h1>

        <!-- ORDER STATUS TOP BADGE -->
        <div class="status-badge">
            <span>Status:</span>
            <span th:text="${order.status}"></span>
        </div>

        <div class="meta">
            <p><b>Order Number:</b> <span th:text="${order.orderNumber}"></span></p>
            <p><b>Date:</b>
                <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </p>
            <p><b>Type:</b> <span th:text="${order.orderType}"></span></p>
        </div>

        <hr>

        <!-- ITEMS -->
        <div th:each="item : ${order.items}" class="item">

            <div class="item-header">
                <span>
                    <span th:text="${item.quantity}"></span> x
                    <span th:text="${item.itemName}"></span>
                </span>

                <span th:text="${item.getTotalPrice()} + ' SEK'"></span>
            </div>

            <!-- CUSTOMIZATIONS -->
            <div th:if="${item.customizations != null}">
                <div th:each="c : ${item.customizations}" class="custom">
                    <span th:text="${c.type == 'ADDABLE' ? '+' : '-'}"></span>
                    <span th:text="${c.name}"></span>
                </div>
            </div>

        </div>

        <hr>

        <!-- TOTAL -->
        <div class="total">
            <span>Total</span>
            <span th:text="${order.totalPrice} + ' SEK'"></span>
        </div>

        <div class="footer">
            Thank you! Enjoy your meal.
        </div>

    </div>

</body>

</html>
